name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pad logo to a square 1024x1024 PNG
        shell: pwsh
        run: |
          magick assets/topgear.png -background none -gravity center -resize 1024x1024 -extent 1024x1024 assets/topgear-square.png

      - name: Generate Tauri icons from logo
        run: npx --yes @tauri-apps/cli@latest icon assets/topgear-square.png

      - name: Stage frontend dist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item index.html, app.js, styles.css -Destination dist
          Copy-Item -Recurse -Force assets -Destination dist/assets

      - name: Extract release notes for this tag
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = ""
          if (Test-Path CHANGELOG.md) {
            $content = Get-Content CHANGELOG.md -Raw
            $pattern = "(?ms)^##\s+$([regex]::Escape($tag))\s*\r?\n(.+?)(?=^##\s|\z)"
            if ($content -match $pattern) {
              $notes = $matches[1].Trim()
            }
          }
          if (-not $notes) {
            $notes = "(אין רשומות גרסה מפורטות ל-$tag)"
          }
          $delim = "EOF_NOTES_" + [Guid]::NewGuid().ToString("N")
          Add-Content -Path $env:GITHUB_OUTPUT -Value "notes<<$delim" -Encoding utf8
          Add-Content -Path $env:GITHUB_OUTPUT -Value $notes -Encoding utf8
          Add-Content -Path $env:GITHUB_OUTPUT -Value $delim -Encoding utf8

      - name: Build & release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TopGear ${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
